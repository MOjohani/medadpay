<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الدفع | مِداد</title>
  <script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>
  <link rel="stylesheet" href__="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css" />
  <link href__="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f4f5f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { font-size: 28px; font-weight: 800; color: #1e2d6b; }
    .plan-box {
      background: #f0f2ff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }
    .plan-name { font-size: 18px; font-weight: 700; color: #1e2d6b; }
    .plan-price { font-size: 28px; font-weight: 800; color: #1e2d6b; margin: 6px 0; }
    .plan-desc { font-size: 13px; color: #666; }
    .success-msg { display: none; text-align: center; padding: 20px 0; }
    .success-msg .icon { font-size: 56px; margin-bottom: 12px; }
    .success-msg h2 { font-size: 22px; font-weight: 800; color: #1e2d6b; margin-bottom: 8px; }
    .success-msg p { color: #555; font-size: 14px; margin-bottom: 20px; }
    .success-msg button {
      background: #1e2d6b; color: white;
      padding: 12px 32px; border-radius: 12px;
      border: none; font-weight: 700; font-size: 15px;
      cursor: pointer; font-family: 'Tajawal', sans-serif;
    }
    .error-msg { color: #c0392b; font-size: 13px; margin-top: 12px; text-align: center; }
    .loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,0.9); z-index: 999;
      flex-direction: column; align-items: center;
      justify-content: center; gap: 16px;
      font-size: 16px; color: #1e2d6b; font-family: 'Tajawal', sans-serif;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e4f0;
      border-top-color: #1e2d6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>جاري التحقق من الدفع...</p>
</div>

<div class="card">
  <div class="logo"><h1>مِداد</h1></div>

  <div class="plan-box" id="planBox">
    <div class="plan-name" id="planName">---</div>
    <div class="plan-price" id="planPrice">---</div>
    <div class="plan-desc" id="planDesc"></div>
  </div>

  <div id="formContainer">
    <div id="moyasar-form"></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="success-msg" id="successMsg">
    <div class="icon">🎉</div>
    <h2>تم الاشتراك بنجاح!</h2>
    <p>تم تفعيل باقتك. ارجع للتطبيق وابدأ المذاكرة!</p>
    <button onclick="window.close()">العودة للتطبيق</button>
  </div>
</div>
